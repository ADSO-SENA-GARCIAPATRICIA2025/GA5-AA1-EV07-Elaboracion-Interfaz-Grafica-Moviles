<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Footsy</title>
    <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/footsy.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

  <div class="auth-page container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <!-- Visual Half -->
      <div class="auth-visual col-md-6 d-none d-md-block position-relative">
        <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=800&auto=format&fit=crop" alt="Footsy Calzado">
        <a href="../index.html" class="auth-visual-back">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Regresar a la Tienda
        </a>
      </div>

      <!-- Panel Half -->
      <div class="auth-panel col-12 col-md-6 d-flex flex-column justify-content-center p-4 p-lg-5">
        <h1 class="auth-title text-center text-md-start">Crear Cuenta</h1>
        <p class="auth-subtitle text-center text-md-start">Únete a Footsy y encuentra tu par de calzado perfecto.</p>

        <form action="login.html" method="GET" class="auth-form">
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <div class="form-group">
                <label class="form-label">Nombre *</label>
                <input type="text" name="first_name" class="form-control" placeholder="Marina" required>
              </div>
            </div>
            <div class="col-12 col-sm-6">
              <div class="form-group">
                <label class="form-label">Apellido *</label>
                <input type="text" name="last_name" class="form-control" placeholder="Ramírez" required>
              </div>
            </div>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Correo Electrónico *</label>
            <input type="email" name="email" class="form-control" placeholder="marina@email.com" required>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Teléfono</label>
            <input type="tel" name="phone" class="form-control" placeholder="+57 300 000 0000">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Fecha de Nacimiento</label>
            <input type="date" name="birth_date" class="form-control">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Contraseña *</label>
            <div class="input-wrapper">
              <input type="password" name="password" id="pw-reg" class="form-control" placeholder="Mínimo 8 caracteres" required>
              <button type="button" class="input-icon-right">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group mb-4">
            <label class="form-label">Confirmar Contraseña *</label>
            <div class="input-wrapper">
              <input type="password" name="password_confirmation" id="pw-conf" class="form-control" placeholder="Repite tu contraseña" required>
              <button type="button" class="input-icon-right">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100" style="margin-top:8px;">CREAR CUENTA</button>

          <p class="login-link text-center mt-3">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
