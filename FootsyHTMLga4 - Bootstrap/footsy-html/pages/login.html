<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Footsy</title>
    <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/footsy.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

  <div class="auth-page container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <!-- Visual Half -->
      <div class="auth-visual col-md-6 d-none d-md-block position-relative">
        <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=800&auto=format&fit=crop" alt="Footsy Calzado">
        <a href="../index.html" class="auth-visual-back">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Regresar a la Tienda
        </a>
      </div>

      <!-- Panel Half -->
      <div class="auth-panel col-12 col-md-6 d-flex flex-column justify-content-center p-4 p-lg-5">
        <h1 class="auth-title text-center text-md-start">Bienvenido a Footsy</h1>
        <p class="auth-subtitle text-center text-md-start">Ingresa para encontrar tu par de calzado perfecto.</p>

        <form action="profile.html" method="GET" class="auth-form">
          <div class="form-group mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="email" class="form-control" placeholder="marina@email.com" value="marina@email.com" required>
          </div>

          <div class="form-group mb-3">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
              <label class="form-label" style="margin:0;">Contraseña</label>
              <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="input-wrapper">
              <input type="password" name="password" id="pw-shopper" class="form-control" placeholder="••••••••" value="password123" required>
              <button type="button" class="input-icon-right">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">INICIAR SESIÓN</button>

          <div class="auth-divider mb-3">CONTINUAR CON</div>

          <button type="button" class="social-btn mb-4">
            <svg width="20" height="20" viewBox="0 0 24 24" class="me-2">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>

          <p class="register-link">
            ¿Nuevo en Footsy? <a href="register.html">Regístrate gratis</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
