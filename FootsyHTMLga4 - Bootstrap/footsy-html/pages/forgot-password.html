<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña — Footsy</title>
    <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="../css/footsy.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

  <div class="recover-page">
    <div class="recover-card p-4 p-sm-5">
      <div class="recover-logo">Footsy</div>
      
      <div class="recover-icon">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h1 class="recover-title">¿Olvidaste tu contraseña?</h1>
      <p class="recover-desc">Ingresa tu correo electrónico registrado y te enviaremos un enlace de recuperación de forma instantánea.</p>

      <form action="login.html" method="GET">
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label">Correo Electrónico *</label>
          <input type="email" name="email" class="form-control" placeholder="marina@email.com" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-bottom:16px;">ENVIAR ENLACE DE RECUPERACIÓN</button>

        <a href="login.html" style="text-align:center; font-size:14px; color:var(--gray-500); display:flex; align-items:center; justify-content:center; gap:8px; font-weight:700;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Volver al inicio de sesión
        </a>
      </form>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
