<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Footsy</title>
    <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="../../css/footsy.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body style="background: var(--gray-100);">

  <div class="admin-login-page">
    <div class="admin-login-hero">
      <div class="admin-login-card p-4 p-sm-5">
        <div class="admin-login-logo">Footsy</div>
        <div class="admin-login-title">Panel de Control Admin</div>

        <form action="dashboard.html" method="GET" class="admin-login-form">
          <div class="form-group">
            <label class="form-label">Correo Electrónico *</label>
            <input type="email" name="email" class="form-control" placeholder="admin@footsy.com" value="admin@footsy.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña *</label>
            <div class="input-wrapper">
              <input type="password" name="password" id="pw-admin" class="form-control" placeholder="••••••••" value="adminpassword" required>
              <button type="button" class="input-icon-right">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <label class="remember-row">
            <input type="checkbox" name="remember" checked>
            Recordar mi sesión
          </label>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
            INICIAR SESIÓN
          </button>
        </form>
      </div>
    </div>
  </div>

  

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
